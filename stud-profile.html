<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Portal</title>
  <link rel="stylesheet" href="stud-profile.css" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand">NIT Silchar Portal</div>
    <div class="nav-links">
      <a href="home_page.html" class="nav-link ">Home</a>
      <a href="complaint.html" class="nav-link">Complaints</a>
      <a href="dept.html" class="nav-link">Departments</a>
    </div>
    <div class="nav-avatar">A</div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- PROFILE CARD -->
    <section class="profile-card">
      <div class="profile-photo-wrapper">
        <div class="profile-photo">
          <span class="photo-label">Photo</span>
          <div class="photo-upload-hint">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 16v-8m-4 4h8M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
        </div>
      </div>
      <div class="profile-info">
        <h1 class="profile-name">Rohan Ali</h1>
        <div class="profile-meta">
          <span class="meta-tag">Scholar ID</span>
          <span class="meta-value">UG_25_CSE_0042</span>
        </div>
        <div class="profile-meta">
          <span class="meta-tag">Email</span>
          <span class="meta-value">rohan_ug_25@cse.nits.ac.in</span>
        </div>
      </div>
      <div class="profile-actions">
        <button class="btn-logout">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/>
          </svg>
          Log Out
        </button>
      </div>
    </section>

    <!-- DASHBOARD -->
    <section class="dashboard">
      <div class="dashboard-header">
        <h2 class="dashboard-title">Dashboard</h2>
        <span class="dashboard-subtitle">Complaint Summary</span>
      </div>
      <div class="stats-grid">
        <div class="stat-card stat-submitted">
          <div class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </div>
          <div class="stat-text">
            <span class="stat-label">Submitted</span>
            <span class="stat-count">34</span>
          </div>
          <div class="stat-bar"><div class="stat-fill" style="width: 100%"></div></div>
        </div>

        <div class="stat-card stat-resolved">
          <div class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
            </svg>
          </div>
          <div class="stat-text">
            <span class="stat-label">Resolved</span>
            <span class="stat-count">3</span>
          </div>
          <div class="stat-bar"><div class="stat-fill" style="width: 9%"></div></div>
        </div>

        <div class="stat-card stat-pending">
          <div class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <div class="stat-text">
            <span class="stat-label">Pending</span>
            <span class="stat-count">31</span>
          </div>
          <div class="stat-bar"><div class="stat-fill" style="width: 91%"></div></div>
          <button class="stat-link" id="togglePendingBtn" onclick="togglePendingList()">
            View all
            <svg id="arrowIcon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="transition: transform 0.3s;">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
            </svg>
          </button>
        </div>
      </div>
    </section>

    <!-- PENDING COMPLAINTS PANEL -->
    <section class="pending-panel" id="pendingPanel">
      <div class="pending-header">
        <div class="pending-header-left">
          <span class="pending-dot"></span>
          <h3 class="pending-title">Pending Complaints</h3>
          <span class="pending-badge">31</span>
        </div>
        <button class="pending-close" onclick="togglePendingList()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <div class="pending-table-wrap">
        <table class="pending-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Problem Title</th>
              <th>Submitted On</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="pendingTableBody"></tbody>
        </table>
      </div>
    </section>

  </main>

  <script>
    const pendingComplaints = [
      { title: "Hostel water supply disruption",      date: "2025-01-04", completion: 10 },
      { title: "Broken classroom projector – LH3",    date: "2025-01-09", completion: 25 },
      { title: "WiFi not working in Block C",         date: "2025-01-14", completion: 40 },
      { title: "Canteen food quality issue",          date: "2025-01-18", completion: 5  },
      { title: "Library AC not functioning",          date: "2025-01-22", completion: 60 },
      { title: "Street light fault near Gate 2",      date: "2025-01-27", completion: 15 },
      { title: "Leaking roof in seminar hall",        date: "2025-02-01", completion: 30 },
      { title: "Drinking water contamination report", date: "2025-02-05", completion: 70 },
      { title: "Sports equipment damaged",            date: "2025-02-09", completion: 20 },
      { title: "Bus schedule not followed",           date: "2025-02-13", completion: 0  },
      { title: "Exam hall seating issue",             date: "2025-02-17", completion: 45 },
      { title: "Gym equipment maintenance needed",    date: "2025-02-20", completion: 55 },
      { title: "Mess billing discrepancy",            date: "2025-02-24", completion: 10 },
      { title: "Lab PC hardware failure – CS Lab 2",  date: "2025-02-28", completion: 80 },
      { title: "Corridor lights not working – A wing",date: "2025-03-03", completion: 35 },
      { title: "Toilet blockage – Block D floor 2",   date: "2025-03-06", completion: 5  },
      { title: "Attendance portal login error",       date: "2025-03-09", completion: 65 },
      { title: "Noise disturbance near reading room", date: "2025-03-12", completion: 20 },
      { title: "Medical room supplies shortage",      date: "2025-03-15", completion: 50 },
      { title: "Gate security concern at night",      date: "2025-03-18", completion: 15 },
      { title: "Faculty cabin AC repair needed",      date: "2025-03-21", completion: 40 },
      { title: "Network printer offline – Admin blk", date: "2025-03-24", completion: 30 },
      { title: "Water heater fault – Hostel Block B", date: "2025-03-26", completion: 25 },
      { title: "Cycle stand roof damaged",            date: "2025-03-28", completion: 10 },
      { title: "Ground maintenance request",          date: "2025-03-30", completion: 0  },
      { title: "ERP portal performance issue",        date: "2025-04-01", completion: 55 },
      { title: "Seminar audio system failure",        date: "2025-04-03", completion: 20 },
      { title: "Fire exit door jammed – Block E",     date: "2025-04-05", completion: 5  },
      { title: "Stray dog issue near hostel",         date: "2025-04-07", completion: 0  },
      { title: "Scholarship portal access denied",    date: "2025-04-09", completion: 30 },
      { title: "CCTV camera offline – Main corridor", date: "2025-04-11", completion: 15 },
    ];

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function getCompletionColor(pct) {
      if (pct >= 70) return '#2E7D32';
      if (pct >= 40) return '#F57C00';
      return '#C62828';
    }

    function buildTable() {
      const tbody = document.getElementById('pendingTableBody');
      tbody.innerHTML = '';
      pendingComplaints.forEach((c, i) => {
        const color = getCompletionColor(c.completion);
        const row = document.createElement('tr');
        row.style.animationDelay = `${i * 0.03}s`;
        row.innerHTML = `
          <td class="row-num">${i + 1}</td>
          <td class="row-title">${c.title}</td>
          <td class="row-date">${formatDate(c.date)}</td>
          <td><span class="status-chip" style="background:${color}18; color:${color}; border-color:${color}40;">
            ${c.completion === 0 ? 'Not Started' : c.completion < 40 ? 'Early Stage' : c.completion < 70 ? 'In Progress' : 'Near Done'}
          </span></td>
        `;
        tbody.appendChild(row);
      });
    }

    function togglePendingList() {
      const panel = document.getElementById('pendingPanel');
      const arrow = document.getElementById('arrowIcon');
      const btn   = document.getElementById('togglePendingBtn');
      const isOpen = panel.classList.toggle('open');
      arrow.style.transform = isOpen ? 'rotate(90deg)' : 'rotate(0deg)';
      btn.textContent = '';
      btn.innerHTML = (isOpen ? 'Close' : 'View all') +
        `<svg id="arrowIcon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="transition:transform 0.3s; transform:${isOpen ? 'rotate(90deg)' : 'rotate(0deg)'}"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>`;
      if (isOpen && !document.getElementById('pendingTableBody').hasChildNodes()) {
        buildTable();
      }
    }
  </script>

</body>
</html>
